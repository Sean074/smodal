name: CI

# Runs on every push to any branch, and on every pull request targeting main.
# Keep it small and fast — this is the single safety net for a solo project.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest tests/ -v
